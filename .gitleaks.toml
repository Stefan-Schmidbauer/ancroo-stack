# ancroo-stack — gitleaks configuration
# Reduces false positives on template/example files with placeholder values.

title = "ancroo-stack gitleaks config"

[allowlist]
  description = "Known safe patterns and template files"

  # CHANGE_ME placeholders in module.env files are templates, not real secrets
  regexes = [
    '''CHANGE_ME[\w]*''',
  ]

  paths = [
    '''.env\.example$''',
    '''.env\.standalone$''',
    '''module\.env$''',
  ]
